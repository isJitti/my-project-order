<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบ - </title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Sarabun', sans-serif;
            background-color: #f0f2f5;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            /* เปลี่ยนภาพพื้นหลังถ้าต้องการ หรือใช้ภาพเดิม */
            background-image: url('https://images.unsplash.com/photo-1555396273-367ea4eb4db5?ixlib=rb-1.2.1&auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
        }

        .bg-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(40, 0, 70, 0.7);
            /* เปลี่ยนฟิล์มดำเป็นม่วงเข้มโปร่งแสง */
            z-index: 1;
        }

        .login-card {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 400px;
            position: relative;
            z-index: 2;
            border-top: 5px solid #ffc107;
            /* เพิ่มขอบบนสีเหลือง */
        }

        .brand-logo {
            width: 80px;
            height: 80px;
            background-color: #6f42c1;
            /* เปลี่ยนพื้นหลังโลโก้เป็นสีม่วง */
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            color: #ffc107;
            /* ไอคอนสีเหลือง */
            font-size: 2rem;
            box-shadow: 0 4px 10px rgba(111, 66, 193, 0.3);
            border: 2px solid #ffc107;
            /* ขอบโลโก้สีเหลือง */
        }

        .btn-login {
            background-color: #6f42c1;
            /* ปุ่มสีม่วง */
            border: none;
            padding: 12px;
            font-size: 1.1rem;
            font-weight: bold;
            transition: all 0.3s;
            color: white;
        }

        .btn-login:hover {
            background-color: #5a32a3;
            /* สีม่วงเข้มตอนชี้ */
            color: #ffc107;
            /* ตัวหนังสือเปลี่ยนเป็นเหลือง */
            transform: translateY(-2px);
        }

        .form-control:focus {
            border-color: #6f42c1;
            box-shadow: 0 0 0 0.2rem rgba(111, 66, 193, 0.25);
        }
    </style>
</head>

<body>

    <div class="bg-overlay"></div>

    <div class="login-card">
        <div class="brand-logo">
            <i class="fas fa-utensils"></i>
        </div>
        <h3 class="text-center fw-bold mb-4">เข้าสู่ระบบ</h3>
        <p class="text-center text-muted mb-4 small">วิทยาลัยเทคโนโลยีไทยอโยธยาบริหารธุรกิจ</p>

        <form onsubmit="handleLogin(event)">
            <div class="mb-3">
                <label class="form-label text-muted small">รหัสนักศึกษา / ชื่อผู้ใช้</label>
                <div class="input-group">
                    <span class="input-group-text bg-light"><i class="fas fa-user"></i></span>
                    <input type="text" id="usernameInput" class="form-control" placeholder="กรอกรหัสนักศึกษา" required>
                </div>
            </div>

            <div class="mb-4">
                <label class="form-label text-muted small">รหัสผ่าน</label>
                <div class="input-group">
                    <span class="input-group-text bg-light"><i class="fas fa-lock"></i></span>
                    <input type="password" id="passwordInput" class="form-control" placeholder="กรอกรหัสผ่าน" required>
                </div>
            </div>

            <button type="submit" class="btn btn-primary btn-login w-100 text-white mb-3">
                เข้าสู่ระบบ
            </button>

        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        function handleLogin(event) {
            event.preventDefault(); // ห้ามรีเฟรชหน้า

            const user = document.getElementById('usernameInput').value.trim();
            const pass = document.getElementById('passwordInput').value.trim();

            // 🟢 กำหนดรหัสลับสำหรับร้านค้า (Database จำลอง)
            const shopAccounts = {
                'shop_noodle': 'noodle',   // username : shop_code
                'shop_rice': 'tamsang',
                'shop_fried': 'fried',
                'shop_drink': 'drink'
            };

            // เช็คว่าเป็นร้านค้าหรือไม่?
            if (shopAccounts[user]) {
                if (pass === '1234') { // รหัสผ่านง่ายๆ สำหรับแม่ค้า
                    // บันทึกสถานะว่า "ฉันคือร้านค้า"
                    localStorage.setItem('userRole', 'shop');
                    localStorage.setItem('shopId', shopAccounts[user]); // บันทึกว่าเป็นร้านไหน

                    alert('ยินดีต้อนรับ ร้านค้าเข้าสู่ระบบ!');
                    window.location.href = 'index.html';
                } else {
                    alert('รหัสผ่านไม่ถูกต้อง!');
                }
            } else {
                // ถ้่าไม่ใช่ร้านค้า ให้ถือว่าเป็นนักเรียนทั้งหมด
                localStorage.setItem('userRole', 'student');
                localStorage.removeItem('shopId'); // ล้างค่าเก่า

                window.location.href = 'index.html';
            }
        }
    </script>
</body>

</html>
