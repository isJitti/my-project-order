<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>สั่งซื้อสำเร็จ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        body {
            background-color: #f8f9fa;
            font-family: 'Sarabun', sans-serif;
        }

        .receipt-card {
            max-width: 500px;
            margin: 50px auto;
            border: none;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            border-radius: 15px;
            overflow: hidden;
        }

        .status-header {
            background-color: #ffc107;
            /* สีเหลืองตอนโหลด */
            color: #000;
            padding: 30px;
            text-align: center;
            transition: all 0.5s;
        }

        .queue-box {
            background-color: #f1f3f5;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            margin: 20px 0;
        }

        .queue-number {
            font-size: 3em;
            font-weight: bold;
            color: #0d6efd;
        }

        .order-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px dashed #ddd;
        }

        .total-section {
            display: flex;
            justify-content: space-between;
            font-size: 1.2em;
            font-weight: bold;
            margin-top: 20px;
            color: #dc3545;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="card receipt-card">
            <div class="status-header">
                <h4 class="mb-0"><i class="fas fa-spinner fa-spin"></i> กำลังบันทึกออเดอร์...</h4>
                <p class="mb-0 mt-2 text-muted small">กรุณาอย่าปิดหน้านี้</p>
            </div>

            <div class="card-body p-4">
                <div class="queue-box">
                    <span class="text-muted">คิวของคุณ</span>
                    <div class="queue-number">...</div>
                </div>

                <h6 class="text-muted mb-3">รายการที่สั่ง</h6>
                <div id="orderItems">
                </div>

                <div class="total-section">
                    <span>ยอดรวมทั้งสิ้น</span>
                    <span id="totalPrice">0 ฿</span>
                </div>

                <div class="mt-4 text-center">
                    <a href="index.html" class="btn btn-outline-secondary w-100 rounded-pill">กลับหน้าหลัก</a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>

    <script>
        // 1. ตั้งค่า Firebase 
        const firebaseConfig = {
            apiKey: "AIzaSyCOz2CQx7TwfMAMeyVwhsZMWz69nOSmqE8",
            authDomain: "lunch-system-9362c.firebaseapp.com",
            projectId: "lunch-system-9362c",
            storageBucket: "lunch-system-9362c.firebasestorage.app",
            messagingSenderId: "927055895768",
            appId: "1:927055895768:web:7216b29115991d90f00bad",
            measurementId: "G-K9ENSYPTBR"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        document.addEventListener('DOMContentLoaded', () => {
            const orderData = localStorage.getItem('myOrder');
            if (!orderData) { alert('ไม่พบรายการ'); window.location.href = 'index.html'; return; }

            const cart = JSON.parse(orderData);
            let total = 0;
            let itemsHtml = '<ul class="list-group mb-3">';

            // แสดงรายการสินค้าหน้าเว็บ
            cart.forEach(item => {
                total += parseInt(item.price);
                itemsHtml += `<li class="list-group-item d-flex justify-content-between lh-sm">
                    <div>
                        <h6 class="my-0">${item.name}</h6>
                        <small class="text-muted">ร้าน: ${item.shop || 'ทั่วไป'}</small>
                    </div>
                    <span class="text-muted">${item.price} ฿</span>
                </li>`;
            });
            itemsHtml += '</ul>';

            document.getElementById('orderItems').innerHTML = itemsHtml;
            document.getElementById('totalPrice').innerText = total + " ฿";

            // สร้างเลขคิว
            const queueNo = 'Q-' + Math.floor(100 + Math.random() * 900);
            document.querySelector('.queue-number').innerText = queueNo;

            localStorage.setItem('lastQueue', queueNo);

            // --- 🟢 เริ่มโซนแยกบิลส่งตามร้าน ---
            // 1. จัดกลุ่มสินค้า (แยกของใครของมัน)
            const ordersByShop = {};
            cart.forEach(item => {
                const shopName = item.shop || 'general'; // ถ้าไม่มีชื่อร้าน ให้ลง general
                if (!ordersByShop[shopName]) {
                    ordersByShop[shopName] = [];
                }
                ordersByShop[shopName].push(item);
            });

            // 2. เตรียมส่งข้อมูลเข้า Firebase ทีละร้าน
            const promises = [];
            const statusHeader = document.querySelector('.status-header');

            for (const [shopName, items] of Object.entries(ordersByShop)) {
                // รวมเงินเฉพาะร้านนั้น
                const shopTotal = items.reduce((sum, item) => sum + item.price, 0);

                const orderPayload = {
                    queue: queueNo,
                    shopType: shopName, // ✅ ระบุชื่อร้านตรงนี้
                    items: items,
                    totalPrice: shopTotal,
                    status: "waiting",
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                };

                // ส่งข้อมูล
                promises.push(db.collection("orders").add(orderPayload));
            }

            // 3. รอจนกว่าจะส่งครบทุกร้าน
            Promise.all(promises)
                .then(() => {
                    statusHeader.style.backgroundColor = "#28a745";
                    statusHeader.innerHTML = `
<h4 class="mb-0 text-white"><i class="fas fa-check-circle"></i> สั่งสำเร็จ!</h4>
                        <p class="mb-0 mt-2 text-white-50">ร้านค้าได้รับออเดอร์แล้ว</p>
                        <div class="mt-3">
                            <a href="tracking.html" class="btn btn-light text-warning fw-bold rounded-pill px-4 shadow-sm">
                                <i class="fas fa-search-location me-1"></i> ติดตามสถานะอาหาร
                            </a>
                        </div>
                    `;
                    localStorage.removeItem('myOrder'); // ล้างตะกร้า
                })
                .catch((error) => {
                    console.error("Error", error);
                    alert("เกิดข้อผิดพลาด: " + error.message);
                });
        });
    </script>
</body>

</html>
