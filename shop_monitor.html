<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <title>ระบบรับออเดอร์ - ร้านค้า</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <audio id="notifSound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>
</head>

<body class="bg-light p-4">

    <div class="container">
        <h2 class="fw-bold mb-4">🔔 รายการออเดอร์เข้ามา (Real-time)</h2>
        <div id="orderContainer" class="row g-3">
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>

    <script>
        // 🔴🔴 เอา config ตัวเดิมมาใส่ตรงนี้ด้วย 🔴🔴
        const firebaseConfig = {
            apiKey: "AIzaSyCOz2CQx7TwfMAMeyVwhsZMWz69nOSmqE8",
            authDomain: "lunch-system-9362c.firebaseapp.com",
            projectId: "lunch-system-9362c",
            storageBucket: "lunch-system-9362c.firebasestorage.app",
            messagingSenderId: "927055895768",
            appId: "1:927055895768:web:7216b29115991d90f00bad",
            measurementId: "G-K9ENSYPTBR"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // ฟังข้อมูลแบบ Real-time (ดักฟังเฉพาะที่สถานะ waiting)
        db.collection("orders")
            .where("status", "==", "waiting") // ดูเฉพาะที่ยังไม่ทำ
            .orderBy("timestamp", "asc")      // เรียงตามเวลามาก่อน-หลัง
            .onSnapshot((snapshot) => {
                const container = document.getElementById('orderContainer');
                container.innerHTML = ""; // เคลียร์ของเก่าก่อนวาดใหม่

                // ถ้ามีข้อมูลใหม่เข้ามา
                snapshot.docChanges().forEach((change) => {
                    if (change.type === "added") {
                        // เล่นเสียงแจ้งเตือน
                        document.getElementById('notifSound').play().catch(e => console.log('ต้องกดหน้าจอก่อนเสียงถึงจะดัง'));
                    }
                });

                // วนลูปสร้างการ์ดออเดอร์
                snapshot.forEach((doc) => {
                    const data = doc.data();
                    const orderId = doc.id;

                    // แปลงรายการอาหารเป็น HTML
                    let itemsHtml = "";
                    data.items.forEach(item => {
                        itemsHtml += `<li>${item.name} (${item.price}฿)</li>`;
                    });

                    // สร้างการ์ด HTML
                    const cardHtml = `
                        <div class="col-md-4">
                            <div class="card shadow-sm border-warning border-3">
                                <div class="card-header bg-warning fw-bold">
                                    คิว: ${data.queue}
                                </div>
                                <div class="card-body">
                                    <ul class="mb-3 ps-3">${itemsHtml}</ul>
                                    <h5 class="text-end text-primary fw-bold">${data.totalPrice} ฿</h5>
                                    <button onclick="finishOrder('${orderId}')" class="btn btn-success w-100">
                                        ✅ ทำเสร็จแล้ว
                                    </button>
                                </div>
                                <div class="card-footer text-muted small">
                                    เวลา: ${data.timestamp ? new Date(data.timestamp.seconds * 1000).toLocaleTimeString() : 'เมื่อกี้'}
                                </div>
                            </div>
                        </div>
                    `;
                    container.innerHTML += cardHtml;
                });
            });

        // ฟังก์ชันเมื่อร้านกด "ทำเสร็จแล้ว"
        function finishOrder(docId) {
            if (confirm('ทำรายการนี้เสร็จแล้วใช่ไหม?')) {
                // อัปเดตสถานะเป็น done (มันจะหายไปจากหน้านี้เอง เพราะเรา filter แค่ waiting)
                db.collection("orders").doc(docId).update({
                    status: "done"
                });
            }
        }
    </script>
</body>

</html>
