<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ติดตามสถานะ - Lunch System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            background-color: #f4f6f9;
            font-family: 'Sarabun', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ---------------- แอนิเมชันเปิดตัว ---------------- */
        @keyframes fadeSlideUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-entry {
            animation: fadeSlideUp 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            opacity: 0;
        }

        /* ---------------- ส่วนหัวสีม่วง ---------------- */
        .tracking-header {
            background: linear-gradient(135deg, #6f42c1 0%, #3a1c61 100%);
            color: white;
            padding: 50px 20px 90px;
            border-bottom-left-radius: 40px;
            border-bottom-right-radius: 40px;
            border-bottom: 5px solid #ffc107;
            box-shadow: 0 10px 30px rgba(111, 66, 193, 0.3);
            text-align: center;
            position: relative;
        }

        .tracking-header::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: radial-gradient(circle at 20% 50%, rgba(255, 255, 255, 0.05) 0%, transparent 50%);
            pointer-events: none;
        }

        .status-card-container {
            margin-top: -60px;
            position: relative;
            z-index: 2;
        }

        /* ---------------- การ์ดสถานะ ---------------- */
        .status-card {
            border: none;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
            margin-bottom: 20px;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .status-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 15px 35px rgba(111, 66, 193, 0.15);
        }

        /* สถานะ: กำลังทำ (สีเหลือง) */
        .status-waiting {
            border-left: 6px solid #ffc107;
        }

        .badge-waiting {
            background: linear-gradient(135deg, #ffc107 0%, #ff9800 100%);
            color: #2e1a47;
            font-weight: 700;
            box-shadow: 0 4px 10px rgba(255, 193, 7, 0.3);
        }

        /* สถานะ: เสร็จแล้ว (สีเขียว) */
        .status-done {
            border-left: 6px solid #198754;
        }

        .badge-done {
            background: linear-gradient(135deg, #198754 0%, #146c43 100%);
            color: white;
            font-weight: 700;
            box-shadow: 0 4px 10px rgba(25, 135, 84, 0.3);
        }

        /* Animation ดุ๊กดิ๊กเวลารอ */
        @keyframes pulse {
            0% {
                opacity: 0.6;
                transform: scale(1);
            }

            50% {
                opacity: 1;
                transform: scale(1.1);
            }

            100% {
                opacity: 0.6;
                transform: scale(1);
            }
        }

        .animate-pulse {
            animation: pulse 1.5s infinite;
        }

        /* ---------------- ปุ่มกลับ ---------------- */
        .btn-back {
            border-radius: 50px;
            padding: 10px 30px;
            border: 2px solid #6f42c1;
            color: #6f42c1;
            font-weight: 600;
            transition: all 0.3s;
            background-color: transparent;
        }

        .btn-back:hover {
            background-color: #6f42c1;
            color: white;
            box-shadow: 0 8px 20px rgba(111, 66, 193, 0.2);
            transform: translateY(-2px);
        }
    </style>
</head>

<body>

    <div class="tracking-header animate-entry" style="animation-delay: 0.1s;">
        <h2 class="fw-bold mb-1 text-warning"><i class="fas fa-search-location me-2"></i>ติดตามสถานะ</h2>
        <p class="opacity-100 text-light fs-5">เช็คอาหารของคุณได้ที่นี่</p>
        <div class="display-4 fw-bold mt-3 text-white" id="myQueueNo">...</div>
    </div>

    <div class="container status-card-container animate-entry" style="animation-delay: 0.3s;">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6" id="statusList">
                <div class="text-center py-5">
                    <div class="spinner-border" style="color: #6f42c1;" role="status"></div>
                    <p class="mt-2 text-muted fw-bold">กำลังโหลดข้อมูล...</p>
                </div>
            </div>
        </div>

        <div class="text-center mt-5">
            <a href="index.html" class="btn btn-outline-secondary btn-back px-4">
                <i class="fas fa-home me-1"></i> กลับหน้าหลัก
            </a>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCOz2CQx7TwfMAMeyVwhsZMWz69nOSmqE8",
            authDomain: "lunch-system-9362c.firebaseapp.com",
            projectId: "lunch-system-9362c",
            storageBucket: "lunch-system-9362c.firebasestorage.app",
            messagingSenderId: "927055895768",
            appId: "1:927055895768:web:7216b29115991d90f00bad"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        document.addEventListener('DOMContentLoaded', () => {
            const myQueue = localStorage.getItem('lastQueue');

            if (!myQueue) {
                document.getElementById('statusList').innerHTML = `
                    <div class="text-center text-muted py-4 card status-card">
                        <div class="card-body">
                            <i class="fas fa-exclamation-circle fa-3x mb-3 text-secondary"></i>
                            <h5 class="fw-bold" style="color: #2e1a47;">ไม่พบประวัติการสั่งซื้อล่าสุด</h5>
                            <p class="small mb-0">คุณอาจจะยังไม่ได้สั่ง หรือเปลี่ยนเครื่องใช้งาน</p>
                        </div>
                    </div>
                `;
                document.getElementById('myQueueNo').innerText = "-";
                return;
            }

            document.getElementById('myQueueNo').innerText = myQueue;

            db.collection("orders")
                .where("queue", "==", myQueue)
                .onSnapshot((snapshot) => {
                    const listDiv = document.getElementById('statusList');
                    listDiv.innerHTML = "";

                    if (snapshot.empty) {
                        listDiv.innerHTML = "<p class='text-center fw-bold text-muted'>ไม่พบข้อมูลออเดอร์</p>";
                        return;
                    }

                    const shopNames = {
                        'noodle': '🍜 ร้านก๋วยเตี๋ยว',
                        'tamsang': '🍛 ร้านตามสั่ง',
                        'fried': '🍡 ร้านของทอด',
                        'drink': '🥤 ร้านน้ำดื่ม',
                        'general': '🍽️ ร้านทั่วไป'
                    };

                    snapshot.forEach(doc => {
                        const data = doc.data();
                        const isDone = data.status === 'done';

                        const statusClass = isDone ? 'status-done' : 'status-waiting';
                        const badgeClass = isDone ? 'badge-done' : 'badge-waiting';
                        const icon = isDone ? '<i class="fas fa-check-circle"></i>' : '<i class="fas fa-clock animate-pulse"></i>';
                        const textStatus = isDone ? 'เสร็จแล้ว พร้อมรับ!' : 'กำลังปรุง...';

                        let menuList = "";
                        data.items.forEach(item => {
                            menuList += `<small class="d-block text-muted" style="font-size: 0.95rem;"><i class="fas fa-caret-right me-1 opacity-50" style="color: #6f42c1;"></i> ${item.name}</small>`;
                        });

                        const html = `
                            <div class="card status-card ${statusClass}">
                                <div class="card-body p-4 d-flex justify-content-between align-items-center">
                                    <div>
                                        <h5 class="fw-bold mb-2" style="color: #2e1a47;">${shopNames[data.shopType] || data.shopType}</h5>
                                        <div class="mb-3">${menuList}</div>
                                        <span class="badge ${badgeClass} rounded-pill px-3 py-2">
                                            ${icon} <span class="${isDone ? 'text-white' : ''}">${textStatus}</span>
                                        </span>
                                    </div>
                                    <div class="text-end">
                                        <h4 class="mb-0 fw-bold" style="color: #6f42c1;">${data.totalPrice} ฿</h4>
                                    </div>
                                </div>
                            </div>
                        `;
                        listDiv.innerHTML += html;
                    });
                });
        });
    </script>
</body>

</html>
