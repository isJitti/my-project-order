<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ติดตามสถานะ - Lunch System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            background-color: #f0f2f5;
            font-family: 'Sarabun', sans-serif;
            min-height: 100vh;
        }

        .tracking-header {
            background: linear-gradient(135deg, #0d6efd 0%, #0a58ca 100%);
            color: white;
            padding: 30px 20px 80px;
            border-bottom-left-radius: 30px;
            border-bottom-right-radius: 30px;
            text-align: center;
        }

        .status-card-container {
            margin-top: -50px;
        }

        .status-card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
            margin-bottom: 20px;
            overflow: hidden;
            transition: transform 0.2s;
        }

        /* สถานะ: กำลังทำ (สีเหลือง) */
        .status-waiting {
            border-left: 5px solid #ffc107;
        }

        .badge-waiting {
            background-color: #fff3cd;
            color: #856404;
        }

        /* สถานะ: เสร็จแล้ว (สีเขียว) */
        .status-done {
            border-left: 5px solid #198754;
        }

        .badge-done {
            background-color: #d1e7dd;
            color: #0f5132;
        }

        /* Animation ดุ๊กดิ๊กเวลารอ */
        @keyframes pulse {
            0% {
                opacity: 0.6;
            }

            50% {
                opacity: 1;
            }

            100% {
                opacity: 0.6;
            }
        }

        .animate-pulse {
            animation: pulse 1.5s infinite;
        }
    </style>
</head>

<body>

    <div class="tracking-header">
        <h2 class="fw-bold mb-1">ติดตามสถานะ</h2>
        <p class="opacity-75">เช็คอาหารของคุณได้ที่นี่</p>
        <div class="display-4 fw-bold mt-3" id="myQueueNo">...</div>
    </div>

    <div class="container status-card-container">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6" id="statusList">
                <div class="text-center py-5">
                    <div class="spinner-border text-primary" role="status"></div>
                    <p class="mt-2 text-muted">กำลังโหลดข้อมูล...</p>
                </div>
            </div>
        </div>

        <div class="text-center mt-4">
            <a href="index.html" class="btn btn-outline-secondary rounded-pill px-4">
                <i class="fas fa-home me-1"></i> กลับหน้าหลัก
            </a>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>

    <script>
        // 1. Config เดิมของคุณ (อย่าลืมตรวจสอบเลขให้ตรงกับไฟล์อื่น)
        const firebaseConfig = {
            apiKey: "AIzaSyCOz2CQx7TwfMAMeyVwhsZMWz69nOSmqE8",
            authDomain: "lunch-system-9362c.firebaseapp.com",
            projectId: "lunch-system-9362c",
            storageBucket: "lunch-system-9362c.firebasestorage.app",
            messagingSenderId: "927055895768",
            appId: "1:927055895768:web:7216b29115991d90f00bad"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        document.addEventListener('DOMContentLoaded', () => {
            // ดึงเลขคิวจากเครื่อง
            const myQueue = localStorage.getItem('lastQueue');

            if (!myQueue) {
                document.getElementById('statusList').innerHTML = `
                    <div class="text-center text-muted py-4">
                        <i class="fas fa-exclamation-circle fa-3x mb-3 text-secondary"></i>
                        <h5>ไม่พบประวัติการสั่งซื้อล่าสุด</h5>
                        <p class="small">คุณอาจจะยังไม่ได้สั่ง หรือเปลี่ยนเครื่องใช้งาน</p>
                    </div>
                `;
                document.getElementById('myQueueNo').innerText = "-";
                return;
            }

            document.getElementById('myQueueNo').innerText = myQueue;

            // ฟังข้อมูลจาก Firebase (เฉพาะคิวของเรา)
            db.collection("orders")
                .where("queue", "==", myQueue)
                .onSnapshot((snapshot) => {
                    const listDiv = document.getElementById('statusList');
                    listDiv.innerHTML = ""; // เคลียร์ของเก่า

                    if (snapshot.empty) {
                        listDiv.innerHTML = "<p class='text-center'>ไม่พบข้อมูลออเดอร์</p>";
                        return;
                    }

                    // แปลงชื่อร้านเป็นภาษาไทย
                    const shopNames = {
                        'noodle': '🍜 ร้านก๋วยเตี๋ยว',
                        'tamsang': '🍛 ร้านตามสั่ง',
                        'fried': '🍡 ร้านของทอด',
                        'drink': '🥤 ร้านน้ำดื่ม',
                        'general': '🍽️ ร้านทั่วไป'
                    };

                    snapshot.forEach(doc => {
                        const data = doc.data();
                        const isDone = data.status === 'done';

                        // กำหนดหน้าตาตามสถานะ
                        const statusClass = isDone ? 'status-done' : 'status-waiting';
                        const badgeClass = isDone ? 'badge-done' : 'badge-waiting';
                        const icon = isDone ? '<i class="fas fa-check-circle text-success"></i>' : '<i class="fas fa-clock animate-pulse"></i>';
                        const textStatus = isDone ? 'เสร็จแล้ว พร้อมรับ!' : 'กำลังปรุง...';

                        // สร้างรายการอาหารย่อยๆ
                        let menuList = "";
                        data.items.forEach(item => {
                            menuList += `<small class="d-block text-muted">- ${item.name}</small>`;
                        });

                        const html = `
                            <div class="card status-card ${statusClass}">
                                <div class="card-body d-flex justify-content-between align-items-center">
                                    <div>
                                        <h5 class="fw-bold mb-1">${shopNames[data.shopType] || data.shopType}</h5>
                                        <div class="mb-2">${menuList}</div>
                                        <span class="badge ${badgeClass} rounded-pill px-3 py-2">
                                            ${icon} ${textStatus}
                                        </span>
                                    </div>
                                    <div class="text-end">
                                        <h4 class="mb-0 fw-bold text-dark">${data.totalPrice} ฿</h4>
                                    </div>
                                </div>
                            </div>
                        `;
                        listDiv.innerHTML += html;
                    });
                });
        });
    </script>
</body>

</html>
